name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  # Allows triggering the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        # Replace the URL below with your actual deployed backend URL
        run: curl -s https://baum-welch-hmm-model.onrender.com/